<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>picoo — WASM 图片处理 Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="logo">picoo</span>
          <span class="tagline">WASM 跨端图片处理</span>
        </div>
        <span id="status" class="status status--loading">初始化中…</span>
      </header>

      <main class="layout">
        <section class="panel">
          <div id="dropzone" class="dropzone" tabindex="0">
            <input id="file" type="file" accept="image/*" multiple hidden />
            <div class="dropzone__icon">↑</div>
            <p class="dropzone__title">拖拽图片到此处，或点击选择</p>
            <p class="dropzone__hint">支持多选 · JPEG / PNG / WebP</p>
          </div>
          <ul id="fileList" class="file-list" hidden></ul>

          <fieldset class="options">
            <legend>处理参数</legend>
            <div class="options__grid">
              <label class="field">
                <span>宽度</span>
                <input id="width" type="number" value="800" min="1" placeholder="自动" />
              </label>
              <label class="field">
                <span>高度</span>
                <input id="height" type="number" min="1" placeholder="自动" />
              </label>
              <label class="field">
                <span>缩放模式</span>
                <select id="mode">
                  <option value="inside">inside</option>
                  <option value="cover">cover</option>
                  <option value="contain">contain</option>
                  <option value="fill">fill</option>
                </select>
              </label>
              <label class="field">
                <span>输出格式</span>
                <select id="format">
                  <option value="jpeg">JPEG</option>
                  <option value="png">PNG</option>
                  <option value="webp">WebP</option>
                </select>
              </label>
              <label class="field field--quality">
                <span id="qualityLabel">质量</span>
                <input id="quality" type="range" min="1" max="100" value="80" />
                <output id="qualityVal">80</output>
              </label>
              <label id="losslessField" class="field field--checkbox" hidden>
                <span>WebP 无损</span>
                <input id="lossless" type="checkbox" />
              </label>
              <label class="field">
                <span>目标体积 KB</span>
                <input id="maxSizeKB" type="number" min="1" placeholder="如 200" />
              </label>
              <label class="field">
                <span>DPI</span>
                <select id="dpi">
                  <option value="">不修改</option>
                  <option value="72">72</option>
                  <option value="150">150</option>
                  <option value="300">300</option>
                </select>
              </label>
            </div>
          </fieldset>

          <div class="actions">
            <button id="run" class="btn btn--primary" disabled>处理当前</button>
            <button id="batch" class="btn" disabled>批量处理</button>
            <button id="download" class="btn btn--ghost" hidden>下载结果</button>
          </div>

          <div id="progressWrap" class="progress-wrap" hidden>
            <div class="progress-bar"><div id="progressBar" class="progress-bar__fill"></div></div>
            <span id="progressText" class="progress-text">0 / 0</span>
          </div>

          <pre id="log" class="log" hidden></pre>
        </section>

        <section class="preview-panel">
          <div class="compare">
            <figure class="compare__item">
              <figcaption>原图</figcaption>
              <div class="compare__frame">
                <img id="previewOriginal" alt="原图" hidden />
                <span id="placeholderOriginal" class="compare__placeholder">选择图片后显示</span>
              </div>
              <dl id="metaOriginal" class="meta"></dl>
            </figure>
            <figure class="compare__item">
              <figcaption>输出</figcaption>
              <div class="compare__frame">
                <img id="previewResult" alt="输出" hidden />
                <span id="placeholderResult" class="compare__placeholder">处理后显示</span>
                <div id="processing" class="processing" hidden>
                  <span class="spinner"></span>
                  <span>Worker 处理中…</span>
                </div>
              </div>
              <dl id="metaResult" class="meta"></dl>
            </figure>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
